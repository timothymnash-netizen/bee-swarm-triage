<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bee Swarm Reporter — Newbury &amp; District Beekeepers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --honey:       #f0a500;
    --honey-light: #fff8e6;
    --honey-dark:  #c07800;
    --sage:        #3d6b4f;
    --sage-light:  #e8f2ec;
    --sage-dark:   #274d36;
    --cream:       #fdf8f0;
    --bark:        #4a3728;
    --bark-light:  #8c6a54;
    --petal:       #f5ede0;
    --white:       #ffffff;
    --shadow:      rgba(74,55,40,0.12);
    --wa-green:    #075e54;
    --wa-teal:     #128C7E;
    --wa-light:    #25d366;
    --wa-bg:       #e8ddd0;
    --wa-bubble:   #dcf8c6;
    --red:         #d63031;
    --red-light:   #fff0f0;
    --blue:        #1a56a5;
    --blue-light:  #f0f6ff;
    --w3w:         #e11f26;
    --w3w-light:   #fff5f5;
    --maps:        #1a7a3f;
    --maps-light:  #f0faf4;
    --purple:      #6a3d9a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    min-height: 100%;
    background: var(--cream);
    font-family: 'DM Sans', sans-serif;
  }

  /* ── Page shell ── */
  .page-wrap {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(240,165,0,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(61,107,79,0.12) 0%, transparent 60%),
      var(--cream);
  }

  /* ── Branding header ── */
  .site-header {
    width: 100%;
    max-width: 480px;
    padding: 28px 20px 0;
    text-align: center;
  }
  .site-header .bee-icon {
    font-size: 36px;
    display: block;
    margin-bottom: 6px;
    filter: drop-shadow(0 2px 8px rgba(240,165,0,0.4));
    animation: floatBee 4s ease-in-out infinite;
  }
  @keyframes floatBee {
    0%, 100% { transform: translateY(0px) rotate(-3deg); }
    50%       { transform: translateY(-6px) rotate(3deg); }
  }
  .site-header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--bark);
    letter-spacing: -0.3px;
    line-height: 1.2;
  }
  .site-header h1 em {
    font-style: italic;
    color: var(--honey-dark);
  }
  .site-header p {
    font-size: 12.5px;
    color: var(--bark-light);
    margin-top: 4px;
    font-weight: 300;
  }
  .ndba-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin-top: 10px;
    background: var(--sage-light);
    border: 0.5px solid rgba(61,107,79,0.3);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    color: var(--sage-dark);
    font-weight: 500;
  }

  /* ── Phone frame ── */
  .phone-outer {
    width: 100%;
    max-width: 420px;
    padding: 16px 12px 24px;
  }
  .phone-frame {
    background: var(--wa-bg);
    border-radius: 18px;
    overflow: hidden;
    box-shadow:
      0 4px 24px var(--shadow),
      0 1px 4px rgba(0,0,0,0.08),
      inset 0 0 0 0.5px rgba(255,255,255,0.5);
    display: flex;
    flex-direction: column;
    min-height: 580px;
    position: relative;
  }

  /* ── WhatsApp header ── */
  .wa-header {
    background: var(--wa-green);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .wa-back {
    color: rgba(255,255,255,0.7);
    font-size: 18px;
    cursor: pointer;
    padding: 2px 4px;
    line-height: 1;
  }
  .wa-avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--honey) 0%, #e8a000 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }
  .wa-info { flex: 1; min-width: 0; }
  .wa-title { font-size: 14px; font-weight: 500; color: #fff; }
  .wa-sub   { font-size: 11px; color: rgba(255,255,255,0.75); }

  /* ── Progress bar ── */
  .progress-bar { height: 2px; background: rgba(0,0,0,0.1); flex-shrink: 0; }
  .progress-fill { height: 2px; background: var(--wa-light); transition: width 0.5s ease; }

  /* ── Chat area ── */
  .chat-body {
    flex: 1;
    padding: 12px 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    overflow-y: auto;
    scroll-behavior: smooth;
    background-image:
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23b5a99a' fill-opacity='0.07'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  /* ── Bubbles ── */
  .bubble-row { display: flex; flex-direction: column; }
  .bubble-row.user-row { align-items: flex-end; }
  .bubble-row.bot-row  { align-items: flex-start; }

  .bubble {
    max-width: 84%;
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 13.5px;
    line-height: 1.55;
    white-space: pre-line;
    animation: bubblePop 0.2s cubic-bezier(0.34,1.56,0.64,1);
    position: relative;
  }
  @keyframes bubblePop {
    from { opacity: 0; transform: scale(0.92) translateY(4px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .bot-bubble  { background: var(--white); color: #111; border-top-left-radius: 2px; box-shadow: 0 1px 2px var(--shadow); }
  .user-bubble { background: var(--wa-bubble); color: #111; border-top-right-radius: 2px; box-shadow: 0 1px 2px var(--shadow); }

  .btime { font-size: 10px; color: #a0a0a0; margin-top: 2px; padding: 0 2px; }

  /* ── Typing indicator ── */
  .typing-row { display: flex; align-items: flex-start; }
  .typing {
    display: flex; gap: 4px; align-items: center;
    padding: 10px 14px;
    background: var(--white);
    border-radius: 12px; border-top-left-radius: 2px;
    box-shadow: 0 1px 2px var(--shadow);
    animation: bubblePop 0.15s ease;
  }
  .typing span {
    width: 7px; height: 7px; background: #bbb; border-radius: 50%;
    animation: typingBounce 1.1s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.18s; }
  .typing span:nth-child(3) { animation-delay: 0.36s; }
  @keyframes typingBounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

  /* ── Options area ── */
  .options-area {
    padding: 8px 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    background: var(--wa-bg);
    border-top: 0.5px solid rgba(0,0,0,0.08);
    max-height: 260px;
    overflow-y: auto;
    flex-shrink: 0;
  }

  .opt-btn {
    background: var(--white);
    border: 0.5px solid rgba(0,0,0,0.15);
    border-radius: 22px;
    padding: 10px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--wa-teal);
    cursor: pointer;
    text-align: center;
    transition: all 0.12s ease;
    width: 100%;
    flex-shrink: 0;
    box-shadow: 0 1px 3px var(--shadow);
  }
  .opt-btn:hover  { background: #f0faf7; transform: translateY(-1px); box-shadow: 0 3px 8px var(--shadow); }
  .opt-btn:active { transform: scale(0.97); background: #d4f0e6; box-shadow: none; }

  .opt-btn.loc-gps   { color: var(--blue);  border-color: #a0bce0; background: var(--blue-light); }
  .opt-btn.loc-w3w   { color: var(--w3w);   border-color: #f0aaaa; background: var(--w3w-light); }
  .opt-btn.loc-maps  { color: var(--maps);  border-color: #9fd4b0; background: var(--maps-light); }
  .opt-btn.opt-muted { color: #888; }

  /* ── Cards ── */
  .card {
    background: var(--white);
    border-radius: 12px; border-top-left-radius: 2px;
    border: 0.5px solid rgba(0,0,0,0.1);
    padding: 12px 14px;
    max-width: 88%;
    align-self: flex-start;
    animation: bubblePop 0.2s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 1px 4px var(--shadow);
  }
  .card-title {
    font-size: 11.5px;
    font-weight: 600;
    color: #777;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }

  /* org card */
  .org-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .org-circle {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 10px; font-weight: 700;
    flex-shrink: 0; letter-spacing: -0.5px;
  }
  .org-circle.bee   { background: linear-gradient(135deg, var(--honey) 0%, var(--honey-dark) 100%); }
  .org-circle.ads   { background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%); }
  .org-circle.hornt { background: linear-gradient(135deg, var(--purple) 0%, #4a2070 100%); }
  .org-name-text    { font-size: 13.5px; font-weight: 600; color: #111; line-height: 1.2; }
  .org-sub-text     { font-size: 11.5px; color: #777; margin-top: 1px; }

  .org-detail {
    font-size: 12.5px;
    color: #333;
    line-height: 1.85;
    border-top: 0.5px solid #f0f0f0;
    padding-top: 10px;
  }
  .org-detail strong { color: #111; }
  .org-link {
    display: inline-block;
    margin-top: 8px;
    font-size: 12px;
    color: var(--wa-teal);
    text-decoration: none;
    font-weight: 600;
  }
  .org-link:hover { text-decoration: underline; }
  .donate-strip {
    margin-top: 10px; padding-top: 10px;
    border-top: 0.5px solid #f0f0f0;
    font-size: 12px; color: #666;
  }
  .donate-strip a { color: var(--honey-dark); font-weight: 600; text-decoration: none; }

  /* location card */
  .loc-row {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 0; border-bottom: 0.5px solid #f0f0f0; cursor: pointer;
    transition: background 0.1s;
  }
  .loc-row:last-child { border-bottom: none; padding-bottom: 0; }
  .loc-row:hover { opacity: 0.8; }
  .loc-icon  { font-size: 16px; width: 22px; text-align: center; flex-shrink: 0; }
  .loc-label { flex: 1; }
  .loc-label strong { display: block; font-size: 13px; font-weight: 500; color: #111; }
  .loc-label span   { font-size: 11px; color: #888; }
  .loc-badge {
    font-size: 10px; padding: 2px 8px; border-radius: 10px;
    font-weight: 600; flex-shrink: 0;
  }
  .badge-gps  { background: var(--blue-light);  color: var(--blue); }
  .badge-w3w  { background: var(--w3w-light);   color: var(--w3w); }
  .badge-maps { background: var(--maps-light);   color: var(--maps); }

  /* ── Input helpers ── */
  .input-label {
    font-size: 12px; font-weight: 500; margin-bottom: 5px;
  }
  .input-hint {
    font-size: 11px; color: #888; margin-bottom: 8px; line-height: 1.5;
  }
  .input-row { display: flex; gap: 6px; align-items: center; }
  .text-input {
    flex: 1; border: 1px solid #ddd; border-radius: 10px;
    padding: 8px 12px; font-size: 13px; font-family: 'DM Sans', sans-serif;
    background: #fafafa; color: #111; outline: none;
    transition: border-color 0.15s;
  }
  .text-input:focus { border-color: var(--honey); background: var(--white); }
  .text-input.err   { border-color: var(--red); }
  .submit-btn {
    border: none; border-radius: 10px;
    padding: 8px 14px; font-size: 13px; font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    color: #fff; cursor: pointer; flex-shrink: 0;
  }
  .back-btn {
    background: none; border: none; font-size: 12px; color: #888;
    text-decoration: underline; cursor: pointer; margin-top: 8px;
    font-family: 'DM Sans', sans-serif; text-align: left;
  }
  .gps-msg { font-size: 12px; color: #888; text-align: center; padding: 8px 0; }

  /* ── Date strip ── */
  .date-strip {
    text-align: center;
    font-size: 11px;
    color: #999;
    background: rgba(255,255,255,0.5);
    border-radius: 10px;
    padding: 3px 10px;
    align-self: center;
    margin: 2px 0;
  }

  /* ── Footer ── */
  .site-footer {
    width: 100%;
    max-width: 420px;
    padding: 0 20px 28px;
    text-align: center;
  }
  .footer-links {
    display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .footer-links a {
    font-size: 11.5px; color: var(--bark-light); text-decoration: none;
    border-bottom: 0.5px solid rgba(139,106,84,0.3);
  }
  .footer-links a:hover { color: var(--bark); }
  .footer-copy {
    font-size: 11px; color: #bbb;
  }

  /* ── Scrollbar ── */
  .chat-body::-webkit-scrollbar,
  .options-area::-webkit-scrollbar { width: 4px; }
  .chat-body::-webkit-scrollbar-thumb,
  .options-area::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 2px; }
</style>
</head>
<body>

<div class="page-wrap">

  <!-- Branding -->
  <header class="site-header">
    <span class="bee-icon">🐝</span>
    <h1>Bee Swarm <em>Reporter</em></h1>
    <p>Identify your swarm and get the right help, fast</p>
    <div class="ndba-badge">
      <span>🌿</span>
      <span>Supported by Newbury &amp; District Beekeepers Association</span>
    </div>
  </header>

  <!-- Chat interface -->
  <div class="phone-outer">
    <div class="phone-frame">

      <div class="wa-header">
        <div class="wa-avatar">🐝</div>
        <div class="wa-info">
          <div class="wa-title">Bee Swarm Reporter</div>
          <div class="wa-sub" id="wa-status">Swarm triage service</div>
        </div>
      </div>

      <div class="progress-bar">
        <div class="progress-fill" id="progress" style="width:0%"></div>
      </div>

      <div class="chat-body" id="chat">
        <div class="date-strip" id="date-strip"></div>
      </div>

      <div class="options-area" id="options"></div>

    </div>
  </div>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="footer-links">
      <a href="https://www.newburybeekeepers.org.uk/swarms" target="_blank">Newbury Beekeepers</a>
      <a href="https://www.adsintegratedpestmanagement.co.uk" target="_blank">ADS Pest Management</a>
      <a href="https://what3words.com" target="_blank">What3Words</a>
    </div>
    <p class="footer-copy">For emergencies always call 999 &nbsp;·&nbsp; Charity no. 1016603</p>
  </footer>

</div>

<script>
// ── Utilities ──────────────────────────────────────────────────────────────
const tn = () => {
  const d = new Date();
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
};
const delay = ms => new Promise(r => setTimeout(r, ms));

let capturedLocation = null;

// Set date strip
const ds = document.getElementById('date-strip');
ds.textContent = new Date().toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' });

// ── Flow definition ────────────────────────────────────────────────────────
const FLOW = {
  start: {
    p:5, s:'Swarm triage service',
    msgs:[
      "Hello! 👋 Welcome to the Bee Swarm Reporter.\n\nI'll help identify what you've found and get you the right help. This takes about 2 minutes.",
      "What time of year is it? Honey bee swarming season is mainly April–August."
    ],
    opts:[
      {l:"🌸 April – August (swarming season)", n:"season_yes"},
      {l:"❄️ September – March (off season)", n:"season_no"}
    ]
  },

  season_no:{
    p:10, s:'Identifying your bees...',
    msgs:["Outside of April–August, honey bee swarming is less common — but let's still check. Where are the insects located?"],
    opts:[
      {l:"🌳 Outdoors — tree, hedge, post or fence", n:"loc_tree"},
      {l:"🏠 Inside a building, wall, chimney or roof", n:"loc_building"},
      {l:"📦 Shed, compost bin, bird box or under decking", n:"loc_box"},
      {l:"🌍 In the ground or small holes in a wall", n:"loc_ground"},
      {l:"😕 Not sure / other", n:"appearance"}
    ]
  },

  season_yes:{
    p:10, s:'Identifying your bees...',
    msgs:["You're in the swarming season 🌸 Let's find out what you've got. Where are the insects located?"],
    opts:[
      {l:"🌳 Outdoors — tree, hedge, post or fence", n:"loc_tree"},
      {l:"🏠 Inside a building, wall, chimney or roof", n:"loc_building"},
      {l:"📦 Shed, compost bin, bird box or under decking", n:"loc_box"},
      {l:"🌍 In the ground or small holes in a wall", n:"loc_ground"},
      {l:"😕 Not sure / other", n:"appearance"}
    ]
  },

  loc_tree:{
    p:20, s:'Identifying your bees...',
    msgs:["Outdoors on a tree or post is classic swarm territory 🐝\n\nAre the insects forming a tight cluster — like a hanging bunch of grapes or rugby ball shape?"],
    opts:[
      {l:"✅ Yes — tight hanging cluster", n:"likely_honeybee"},
      {l:"❌ No — flying loosely or entering a gap", n:"loc_entering"},
      {l:"😕 Not sure", n:"appearance"}
    ]
  },

  loc_building:{
    p:20, s:'Identifying your bees...',
    msgs:["Bees inside a building need careful handling.\n\nAre they coming and going through a specific gap or hole — suggesting an established colony?"],
    opts:[
      {l:"✅ Yes — using a specific entry point", n:"established_building"},
      {l:"🆕 No — seem to have just arrived as a cluster", n:"appearance"},
      {l:"😕 Not sure", n:"appearance"}
    ]
  },

  established_building:{
    p:22, s:'Identifying your bees...',
    msgs:["An established colony inside a building needs specialist removal.\n\nImportant: beekeepers are only insured to remove accessible swarms, not established colonies within building structures. Let's confirm the species first."],
    opts:[{l:"🔍 Identify the species", n:"appearance"}]
  },

  loc_box:{
    p:20, s:'Identifying your bees...',
    msgs:["Bird boxes, compost bins and under decking are favourite spots for bumble bees — especially the tree bumble bee. Let's confirm the species."],
    opts:[{l:"🔍 Check the appearance", n:"appearance"}]
  },

  loc_ground:{
    p:20, s:'Identifying your bees...',
    msgs:["Small bees popping in and out of holes in the ground or wall are very likely solitary or mason bees — there are around 250 species in the UK.\n\nDo they have a reddish-brown body or are they very dark (almost black)?"],
    opts:[
      {l:"✅ Yes — reddish/brown or very dark", n:"solitary_bee"},
      {l:"❌ No — brighter colouring", n:"appearance"},
      {l:"😕 Not sure", n:"appearance"}
    ]
  },

  loc_entering:{
    p:22, s:'Identifying your bees...',
    msgs:["Bees entering and leaving a specific gap or hole may be an established colony. Let's identify the species."],
    opts:[{l:"🔍 Identify the species", n:"appearance"}]
  },

  solitary_bee:{
    p:90, s:'Advice ready ✓',
    msgs:[
      "These are almost certainly solitary or mason bees 🐝\n\nIf they're flying in and out of small holes in brickwork in September, they may be ivy bees — which look similar to honey bees but have more defined stripes.",
      "All solitary bees are completely harmless, important pollinators and need no action from you. Their numbers naturally decrease by late summer.\n\nPlease leave them alone and enjoy watching them!"
    ],
    opts:[{l:"✅ Thank you — understood", n:"done_no_action"},{l:"🔁 Start again", n:"start"}]
  },

  appearance:{
    p:30, s:'Identifying your bees...',
    msgs:["Look at the insects carefully from a safe distance. How would you describe their body?"],
    opts:[
      {l:"🟡 Small, smooth & sleek, golden/amber striped", n:"q_cluster"},
      {l:"🟡 Fluffy/furry, chunky body, yellow-black banding", n:"bumblebee_confirm"},
      {l:"⚫ Smooth, very thin waist, bright yellow & black", n:"wasp_confirm"},
      {l:"🟤 Very large insect, brown thorax, brown & yellow", n:"hornet_q"},
      {l:"😕 Hard to tell from here", n:"id_unsure"}
    ]
  },

  q_cluster:{
    p:38, s:'Identifying your bees...',
    msgs:["Honey bees are small — roughly fingernail-sized — and not fluffy.\n\nIs there a large cluster or hanging mass of them anywhere?"],
    opts:[
      {l:"✅ Yes — a large hanging cluster or mass", n:"likely_honeybee"},
      {l:"❌ No — flying in and out of a specific point", n:"loc_entering"},
      {l:"😕 Not sure", n:"likely_honeybee"}
    ]
  },

  bumblebee_confirm:{
    p:40, s:'Identifying your bees...',
    msgs:[

// ── DOM helpers ────────────────────────────────────────────────────────────
function getChat()    { return document.getElementById('chat'); }
function getOptions() { return document.getElementById('options'); }

function scrollBottom() {
  const c = getChat();
  c.scrollTop = c.scrollHeight;
}

function addBubble(text, type) {
  const chat = getChat();
  const row = document.createElement('div');
  row.className = `bubble-row ${type}-row`;
  const b = document.createElement('div');
  b.className = `bubble ${type}-bubble`;
  b.textContent = text;
  const t = document.createElement('div');
  t.className = 'btime';
  t.textContent = tn();
  row.appendChild(b);
  row.appendChild(t);
  chat.appendChild(row);
  scrollBottom();
}

function addCard(html) {
  const chat = getChat();
  const row = document.createElement('div');
  row.className = 'bubble-row bot-row';
  row.innerHTML = html;
  chat.appendChild(row);
  scrollBottom();
}

function showTyping() {
  const chat = getChat();
  const row = document.createElement('div');
  row.className = 'bubble-row bot-row typing-row';
  row.id = 'typing-indicator';
  const t = document.createElement('div');
  t.className = 'typing';
  t.innerHTML = '<span></span><span></span><span></span>';
  row.appendChild(t);
  chat.appendChild(row);
  scrollBottom();
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function setOptions(opts) {
  const area = getOptions();
  area.innerHTML = '';
  (opts || []).forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt.l;
    btn.onclick = () => handleChoice(opt.l, opt.n);
    area.appendChild(btn);
  });
}

function setProgress(p, s) {
  document.getElementById('progress').style.width = p + '%';
  if (s) document.getElementById('wa-status').textContent = s;
}

// ── User choice handler ────────────────────────────────────────────────────
async function handleChoice(label, next) {
  getOptions().innerHTML = '';
  addBubble(label, 'user');
  await delay(400);
  await runNode(next);
}

// ── Location capture ───────────────────────────────────────────────────────
function showLocationPicker() {
  const area = getOptions();
  area.innerHTML = '';
  [
    { cls:'opt-btn loc-gps',  txt:'📍 Use my current GPS location',       fn: ()=>captureGPS(area) },
    { cls:'opt-btn loc-w3w',  txt:'///  Enter a What3Words address',       fn: ()=>showW3WInput(area) },
    { cls:'opt-btn loc-maps', txt:'🗺️  Share a Google Maps dropped pin',   fn: ()=>showMapsInput(area) },
    { cls:'opt-btn opt-muted',txt:"⏭️  Skip — I'll give the address by phone", fn: ()=>{ capturedLocation={type:'manual'}; handleChoice("⏭️ I'll give the address by phone", 'cl_contact'); } }
  ].forEach(b => {
    const btn = document.createElement('button');
    btn.className = b.cls;
    btn.textContent = b.txt;
    btn.onclick = b.fn;
    area.appendChild(btn);
  });
}

function captureGPS(area) {
  area.innerHTML = '<div class="gps-msg">📍 Getting your location…</div>';
  if (!navigator.geolocation) {
    area.innerHTML = '<div class="gps-msg">GPS is not available on this device. Please use another method.</div>';
    setTimeout(() => showLocationPicker(), 2000);
    return;
  }
  navigator.geolocation.getCurrentPosition(
    pos => {
      const lat = pos.coords.latitude.toFixed(6);
      const lng = pos.coords.longitude.toFixed(6);
      capturedLocation = { type:'gps', lat, lng };
      const mapsUrl = `https://maps.google.com/?q=${lat},${lng}`;
      addBubble('📍 GPS location captured', 'user');
      addCard(`<div class="card">
        <div class="card-title">📍 Location captured</div>
        <div class="loc-row" onclick="window.open('${mapsUrl}','_blank')">
          <div class="loc-icon">🗺️</div>
          <div class="loc-label"><strong>View on Google Maps</strong><span>${lat}, ${lng}</span></div>
          <div class="loc-badge badge-gps">GPS</div>
        </div>
      </div><div class="btime">${tn()}</div>`);
      getOptions().innerHTML = '';
      delay(700).then(() => runNode('cl_contact'));
    },
    () => {
      area.innerHTML = '<div class="gps-msg">Could not get location. Please try another method.</div>';
      setTimeout(() => showLocationPicker(), 2000);
    },
    { timeout: 10000 }
  );
}

function showW3WInput(area) {
  area.innerHTML = `
    <div class="input-label" style="color:var(--w3w);">/// What3Words address</div>
    <div class="input-hint">Find your three-word address at <strong>what3words.com</strong> or in the free app. Enter the three words below, separated by dots.</div>
    <div class="input-row">
      <span style="color:var(--w3w);font-weight:700;font-size:14px;flex-shrink:0;">///</span>
      <input class="text-input" id="w3w-field" placeholder="word.word.word" autocomplete="off" autocapitalize="none" spellcheck="false"/>
      <button class="submit-btn" style="background:var(--w3w);" onclick="submitW3W()">✓</button>
    </div>
    <button class="back-btn" onclick="showLocationPicker()">← Back to location options</button>
  `;
  document.getElementById('w3w-field').focus();
  document.getElementById('w3w-field').addEventListener('keydown', e => { if(e.key==='Enter') submitW3W(); });
}

function submitW3W() {
  const raw = document.getElementById('w3w-field').value.trim().replace(/^\/+/, '');
  const parts = raw.split('.');
  if (parts.length !== 3 || parts.some(p => !p)) {
    document.getElementById('w3w-field').classList.add('err');
    return;
  }
  capturedLocation = { type:'w3w', words: raw };
  const w3wUrl = `https://what3words.com/${raw}`;
  addBubble(`/// ${raw}`, 'user');
  addCard(`<div class="card">
    <div class="card-title">/// What3Words location</div>
    <div class="loc-row" onclick="window.open('${w3wUrl}','_blank')">
      <div class="loc-icon" style="color:var(--w3w);font-weight:700;font-size:12px;">///</div>
      <div class="loc-label"><strong>${raw}</strong><span>Tap to verify on What3Words ↗</span></div>
      <div class="loc-badge badge-w3w">W3W</div>
    </div>
  </div><div class="btime">${tn()}</div>`);
  getOptions().innerHTML = '';
  delay(700).then(() => runNode('cl_contact'));
}

function showMapsInput(area) {
  area.innerHTML = `
    <div class="input-label" style="color:var(--maps);">🗺️ Share a Google Maps dropped pin</div>
    <div class="input-hint">
      1. Open <strong>Google Maps</strong> on your phone<br>
      2. Press & hold on the exact swarm location<br>
      3. Tap the address at the bottom → <em>Share</em> → Copy link<br>
      4. Paste the link in the box below 👇
    </div>
    <div class="input-row">
      <input class="text-input" id="maps-field" placeholder="Paste your Google Maps link here" autocomplete="off"/>
      <button class="submit-btn" style="background:var(--maps);" onclick="submitMapsPin()">✓</button>
    </div>
    <button class="back-btn" onclick="showLocationPicker()">← Back to location options</button>
  `;
  document.getElementById('maps-field').focus();
  document.getElementById('maps-field').addEventListener('keydown', e => { if(e.key==='Enter') submitMapsPin(); });
}

function submitMapsPin() {
  const val = document.getElementById('maps-field').value.trim();
  if (!val || val.length < 10) {
    document.getElementById('maps-field').classList.add('err');
    return;
  }
  capturedLocation = { type:'maps', url: val };
  const openUrl = val.startsWith('http') ? val : 'https://maps.google.com';
  addBubble('🗺️ Google Maps pin shared', 'user');
  addCard(`<div class="card">
    <div class="card-title">🗺️ Google Maps dropped pin</div>
    <div class="loc-row" onclick="window.open('${openUrl}','_blank')">
      <div class="loc-icon">📌</div>
      <div class="loc-label"><strong>Dropped pin — tap to open</strong><span>Google Maps link confirmed</span></div>
      <div class="loc-badge badge-maps">Maps</div>
    </div>
  </div><div class="btime">${tn()}</div>`);
  getOptions().innerHTML = '';
  delay(700).then(() => runNode('cl_contact'));
}

// ── Main runner ────────────────────────────────────────────────────────────
async function runNode(key) {
  const node = FLOW[key];
  if (!node) return;

  setProgress(node.p, node.s);

  for (let i = 0; i < node.msgs.length; i++) {
    showTyping();
    const t = Math.min(Math.max(node.msgs[i].length * 14, 500), 1900);
    await delay(t);
    removeTyping();
    addBubble(node.msgs[i], 'bot');
    if (i < node.msgs.length - 1) await delay(300);
  }
  await delay(200);

  switch (node.special) {
    case 'location_picker':   showLocationPicker(); break;
    case 'newbury_contact':   showOrgCard('newbury'); break;
    case 'ads_card_wasp':     showOrgCard('ads_wasp'); break;
    case 'ads_card_bumble':   showOrgCard('ads_bumble'); break;
    case 'ads_card_building': showOrgCard('ads_building'); break;
    default:                  setOptions(node.opts || []); break;
  }
}

// ── Boot ───────────────────────────────────────────────────────────────────
runNode('start');
</script>
